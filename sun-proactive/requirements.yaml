packages:
  "framer-motion": "For page transitions and smooth UI animations"
  "@hookform/resolvers": "Zod validation for react-hook-form"
  "react-hook-form": "Form state management"
  "zod": "Schema validation"
  "date-fns": "For formatting dates in tasks and profiles"
  "clsx": "Utility for constructing className strings"
  "tailwind-merge": "Utility for merging tailwind classes"

images:
  - path: "artifacts/sun-proactive/public/images/hero-sunny.png"
    description: "A bright, warm, abstract illustration of a sun rising over a community, using vibrant oranges, yellows, and soft sky blues. Modern vector art style, uplifting and optimistic."
    aspect_ratio: "16:9"
  - path: "artifacts/sun-proactive/public/images/logo-sun.png"
    description: "A minimal, modern geometric logo of a sun with overlapping abstract shapes representing hands or people coming together. Colors: vibrant orange and yellow on a transparent background."
    aspect_ratio: "1:1"
  - path: "artifacts/sun-proactive/public/images/pattern-bg.png"
    description: "A subtle, seamless background pattern of soft sunbursts and abstract organic shapes in very pale yellow and cream colors. Low contrast, meant to be used as a textured background."
    aspect_ratio: "16:9"

notes:
  - "Assuming @workspace/api-client-react exports generated hooks."
  - "Forms use react-hook-form with zod resolvers."
